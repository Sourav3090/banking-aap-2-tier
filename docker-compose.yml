services:
  simplebank_app:
    image: 594474085977.dkr.ecr.us-west-1.amazonaws.com/flaskapp-simple-bank:${IMAGE_TAG:-latest}
    container_name: simplebank_aap
    ports:
      - "5000:5000"
    environment:
      - "FLASK_ENV=production"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
      