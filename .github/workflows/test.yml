name: Test Workflow

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::594474085977:role/github-action-deploy-role
          aws-region: us-west-1

      - name: Print Private IPs via SSM
        run: |
          set -e

          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["hostname -i"]}' \
            --timeout-seconds 60 \
            --query 'Command.CommandId' \
            --output text
          )

          echo "Command ID: $CMD_ID"

          sleep 10

          aws ssm list-command-invocations \
            --command-id "$CMD_ID" \
            --details \
            --query "CommandInvocations[*].{Instance:InstanceId,Status:Status,Output:CommandPlugins[0].Output}" \
            --output table